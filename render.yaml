services:
  - type: web
    name: watch-party-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://watch-party-client.onrender.com

  - type: web
    name: watch-party-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        value: https://youtube-music-14.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
